<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Detector | Cyber Security Tool</title>
    <meta name="description" content="Check your password strength in real-time. See how fast it can be hacked, get breach alerts, and generate secure passwords.">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scan-line"></div>
    <div class="container">
        <div class="glow-effect"></div>
        
        <div class="header">
            <div class="shield-icon">⚡</div>
            <h1>PASSWORD STRENGTH <span class="glitch">DETECTOR</span></h1>
            <p class="tagline">>_ SYSTEM READY — ANALYZE YOUR CRYPTOGRAPHIC FORTRESS</p>
        </div>

        <div class="input-wrapper">
            <div class="input-group">
                <label class="input-label">>_ ENCRYPTED INPUT</label>
                <input type="password" id="password" placeholder="[ENTER PASSWORD]" autocomplete="off">
                <button id="togglePassword" class="toggle-btn">
                    <span>👁</span>
                </button>
            </div>
        </div>

        <div class="strength-section">
            <div class="strength-meter">
                <div class="strength-bar" id="strengthBar"></div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label">[ STRENGTH SCORE ]</span>
                    <div class="stat-value">
                        <span id="scoreValue">0</span>
                        <span class="stat-unit">/100</span>
                    </div>
                </div>
                <div class="stat-card">
                    <span class="stat-label">[ CRACK TIME ]</span>
                    <div class="stat-value" id="crackTime">—</div>
                </div>
                <div class="stat-card">
                    <span class="stat-label">[ SECURITY LEVEL ]</span>
                    <div class="stat-value" id="strengthLabel">VERY WEAK</div>
                </div>
            </div>
        </div>

        <div class="suggestions" id="suggestions">
            <div class="suggestions-header">
                <span>>_ SECURITY PROTOCOL TIPS</span>
            </div>
            <ul id="suggestionsList">
                <li>>_ ENTER PASSWORD TO INITIATE SCAN</li>
            </ul>
        </div>

        <div class="action-buttons">
            <button id="generateBtn" class="btn btn-primary">
                [ GENERATE QUANTUM PASSWORD ]
            </button>
            <button id="breachCheckBtn" class="btn btn-secondary">
                [ SCAN BREACH DATABASE ]
            </button>
        </div>

        <div id="breachResult" class="breach-result"></div>

        <footer>
            <p>>_ LOCAL SCAN ONLY — YOUR DATA NEVER LEAVES THIS TERMINAL</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
